<!DOCTYPE html>
<html lang="ru" data-theme="default" data-bg="none">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#F5F7FA">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 56 40' fill='none'><g stroke='%232A5CAA' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M5 10 L19 8 L19 32 L5 30 Z' fill='white'/><path d='M19 8 L28 9 L33 14 L33 32 L19 32 Z' fill='white'/><path d='M19 8 V32'/></g><path d='M28 9 L52 2 L43 16 L33 14 Z' fill='%23FF7A42'/><path d='M52 2 L43 16 L37 11 Z' fill='%23E5651C'/></svg>">
<title>StudyFlow</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* === StudyFlow light palette === Primary #2A5CAA / Accent #FF7A42 / BG #F5F7FA / Text #333333 */
:root,[data-theme="default"]{--bg:#F5F7FA;--surface:#FFFFFF;--surface2:#EEF2F7;--surface3:#E2E8F0;--accent:#2A5CAA;--accent2:#FF7A42;--green:#22C55E;--text:#333333;--dim:#5C6B80;--muted:#94A3B8;--border:rgba(42,92,170,.16);--shadow:0 2px 10px rgba(42,92,170,.06);--r:16px;--r-sm:10px}
[data-theme="midnight"]{--bg:#F4F2FB;--surface:#FFFFFF;--surface2:#EDE9F8;--surface3:#DDD4F0;--accent:#7C3AED;--accent2:#A78BFA;--green:#22C55E;--text:#333333;--dim:#6B5B95;--muted:#A89BC0;--border:rgba(124,58,237,.16);--shadow:0 2px 10px rgba(124,58,237,.06)}
[data-theme="aurora"]{--bg:#EFFAF5;--surface:#FFFFFF;--surface2:#DEF7EB;--surface3:#BFEFD5;--accent:#0E9F70;--accent2:#10B981;--green:#10B981;--text:#333333;--dim:#3F7B62;--muted:#8FB8A5;--border:rgba(16,185,129,.18);--shadow:0 2px 10px rgba(16,185,129,.06)}
[data-theme="sunset"]{--bg:#FFF6F0;--surface:#FFFFFF;--surface2:#FFEBDC;--surface3:#FFD8BF;--accent:#EA580C;--accent2:#FB923C;--green:#22C55E;--text:#333333;--dim:#8A5230;--muted:#C99B7C;--border:rgba(234,88,12,.18);--shadow:0 2px 10px rgba(234,88,12,.06)}
[data-theme="ocean"]{--bg:#EEF8FB;--surface:#FFFFFF;--surface2:#DCF1F8;--surface3:#BCE2ED;--accent:#0891B2;--accent2:#06B6D4;--green:#22C55E;--text:#333333;--dim:#3F6F7C;--muted:#8FB4BE;--border:rgba(8,145,178,.18);--shadow:0 2px 10px rgba(8,145,178,.06)}
[data-theme="sakura"]{--bg:#FDF2F8;--surface:#FFFFFF;--surface2:#FBE5F1;--surface3:#F4CCE0;--accent:#DB2777;--accent2:#EC4899;--green:#22C55E;--text:#333333;--dim:#8A4670;--muted:#C295AE;--border:rgba(219,39,119,.18);--shadow:0 2px 10px rgba(219,39,119,.06)}
[data-bg="dots"] body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,var(--muted) 1px,transparent 1px);background-size:28px 28px;opacity:.35}
[data-bg="grid"] body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.6}
[data-bg="circuit"] body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px),radial-gradient(circle 2px at 0 0,var(--accent2) 1px,transparent 2px);background-size:60px 60px,60px 60px,60px 60px;opacity:.35}
[data-bg="aurora"] body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 40% at 20% 20%,rgba(var(--_ac),.12),transparent),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(var(--_ac2),.14),transparent);animation:auroraShift 8s ease-in-out infinite alternate}
[data-theme="default"][data-bg="aurora"]{--_ac:42,92,170;--_ac2:255,122,66}
[data-theme="midnight"][data-bg="aurora"]{--_ac:124,58,237;--_ac2:167,139,250}
[data-theme="aurora"][data-bg="aurora"]{--_ac:16,185,129;--_ac2:52,211,153}
[data-theme="sunset"][data-bg="aurora"]{--_ac:234,88,12;--_ac2:251,146,60}
[data-theme="ocean"][data-bg="aurora"]{--_ac:8,145,178;--_ac2:34,211,238}
[data-theme="sakura"][data-bg="aurora"]{--_ac:219,39,119;--_ac2:244,114,182}
@keyframes auroraShift{from{opacity:.8}to{opacity:1;transform:scale(1.05)}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter','Roboto',system-ui,-apple-system,sans-serif;font-feature-settings:'cv11','ss01';background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;position:relative;z-index:1;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.app-brand{display:flex;align-items:center;gap:9px;padding:12px 20px 6px;user-select:none}
.brand-mark{width:36px;height:26px;flex-shrink:0;display:block}
.brand-wordmark{font-family:'Inter','Roboto',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.3px;color:var(--text);line-height:1}
.brand-wordmark .b-accent{color:var(--accent2)}
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;padding-bottom:88px;opacity:0;pointer-events:none;transition:opacity .18s ease;scrollbar-width:none}
.view::-webkit-scrollbar{display:none}
.view.active{opacity:1;pointer-events:all}
.header{padding:6px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.header-date{font-size:18px;font-weight:700;letter-spacing:.3px}
.icon-btn{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--accent2);font-size:17px;transition:background .15s;box-shadow:var(--shadow)}
.icon-btn:active{background:var(--surface2)}
.days-strip{padding:0 16px 10px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.days-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;width:46px;height:46px;border-radius:13px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;position:relative;line-height:1;box-shadow:var(--shadow)}
.day-pill .dn{font-size:9px;font-weight:500;color:var(--dim);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
.day-pill.active{background:var(--accent);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(42,92,170,.28)}
.day-pill.active .dn{color:rgba(255,255,255,.7)}
.day-pill.has-hw::after{content:'';position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--green)}
.day-pill.active.has-hw::after{background:#fff}
.lessons-list{padding:4px 14px 8px;display:flex;flex-direction:column;gap:8px}
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px;transition:border-color .2s, box-shadow .2s;box-shadow:var(--shadow)}
.lesson-card.has-hw{border-color:var(--accent);box-shadow:0 2px 14px rgba(42,92,170,.12)}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.lc-subject{font-size:15px;font-weight:700;flex:1;line-height:1.3}
.lc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lc-time{font-size:12px;font-weight:600;color:var(--dim);white-space:nowrap}
.lc-kind{font-size:12px;color:var(--dim);margin-bottom:6px}
.lc-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.lc-dot{width:3px;height:3px;border-radius:50%;background:var(--muted);flex-shrink:0}
.hw-toggle{width:30px;height:30px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--accent2);font-size:15px;font-weight:600;transition:all .2s;flex-shrink:0}
.hw-toggle.open{background:rgba(34,197,94,.18);color:#15803d}
.lc-hw{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.lc-hw.open{display:block}
.lc-hw-text{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.btn-primary{width:100%;padding:11px;background:var(--accent);border-radius:10px;color:#fff;font-size:13px;font-weight:600;transition:opacity .15s,transform .1s;box-shadow:0 2px 8px rgba(42,92,170,.22)}
.btn-primary:active{opacity:.9;transform:translateY(1px)}
.page-header{padding:6px 20px 10px;font-size:18px;font-weight:700}
.subject-group{margin:0 14px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.subj-title{padding:13px 14px;font-size:14px;font-weight:700}
.hw-row{border-top:1px solid var(--border);padding:11px 14px}
.hw-row-top{display:flex;align-items:center;gap:10px}
.hw-row-date{font-size:14px;font-weight:700;color:var(--accent2);flex-shrink:0;min-width:38px}
.hw-row-kind{font-size:13px;color:var(--dim);flex:1}
.hw-chevron{width:30px;height:30px;border-radius:9px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--accent2);font-size:15px;font-weight:600;transition:all .2s}
.hw-chevron.open{background:rgba(34,197,94,.18);color:#15803d}
.hw-row-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.hw-row-body.open{display:block}
.hw-row-task{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:10px}
.hw-empty{font-size:12px;color:var(--muted);padding:10px 0}
.detail-header{padding:6px 14px 8px;display:flex;align-items:center;gap:12px}
.detail-meta{flex:1;min-width:0}
.detail-subject{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-kind{font-size:12px;color:var(--dim);margin-top:2px}
.detail-date-badge{flex-shrink:0;background:var(--surface2);border-radius:8px;padding:5px 10px;font-size:14px;font-weight:700;color:var(--accent2)}
.detail-card{margin:4px 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-size:14px;line-height:1.75;box-shadow:var(--shadow)}
.attachments{margin:0 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.attach-photo{border-radius:13px;overflow:hidden;aspect-ratio:1;background:var(--surface);border:1px solid var(--border)}
.attach-photo img{width:100%;height:100%;object-fit:cover;display:block}
.attach-doc{border-radius:11px;background:var(--surface);border:1px solid var(--border);padding:12px;display:flex;align-items:center;gap:10px;font-size:13px;grid-column:1/-1}
/* PROFILE */
.profile-hero{display:flex;flex-direction:column;align-items:center;padding:14px 20px 20px}
.avatar-wrap{position:relative;width:92px;height:92px;margin-bottom:16px}
.avatar-ring{position:absolute;inset:-3px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--green))}
.avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--surface2);border:3px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;color:var(--accent2);position:relative}
.avatar-inner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.profile-name{font-size:22px;font-weight:700;margin-bottom:4px}
.profile-username{font-size:13px;color:var(--dim)}
.profile-section{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.ps-title{padding:12px 14px 8px;font-size:10px;font-weight:700;color:var(--dim);letter-spacing:.9px;text-transform:uppercase}
.ps-body{padding:0 14px 14px}
.sg-pills{display:flex;gap:10px}
.sg-pill{flex:1;padding:13px;border-radius:12px;text-align:center;background:var(--surface2);border:2px solid transparent;font-size:14px;font-weight:600;color:var(--dim);transition:all .2s}
.sg-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.theme-swatch{border-radius:12px;overflow:hidden;height:62px;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative}
.theme-swatch.active{border-color:var(--accent2)}
.theme-swatch.active::after{content:'✓';position:absolute;top:4px;right:7px;font-size:12px;font-weight:700;color:#fff;background:var(--accent);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw-preview{width:100%;height:100%;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;padding:8px;gap:3px}
.sw-line{height:5px;border-radius:3px;opacity:.75}
.bg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.bg-opt{border-radius:11px;height:52px;cursor:pointer;border:2px solid var(--border);transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:700;color:var(--dim);background:var(--surface2);letter-spacing:.4px;text-transform:uppercase}
.bg-opt.active{border-color:var(--accent2);color:var(--accent2)}
.bg-ico{font-size:17px}

.lightbox{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex;animation:fadeIn .18s ease}
.lightbox-img{max-width:100%;max-height:85vh;object-fit:contain;border-radius:10px}
.lightbox-close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.attach-photo{cursor:pointer}

.color-picker-row{display:flex;align-items:center;gap:10px;padding:0 14px 14px}
.color-swatch-grid{display:flex;flex-wrap:wrap;gap:8px;flex:1}
.color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .18s;flex-shrink:0}
.color-dot.active{border-color:#333;transform:scale(1.15);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.color-custom-wrap{display:flex;align-items:center;gap:6px}
.color-custom-btn{width:32px;height:32px;border-radius:50%;border:2px dashed var(--dim);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;position:relative;overflow:hidden}
.color-custom-btn input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
/* CALENDAR */
.cal-overlay{position:fixed;inset:0;z-index:200;background:rgba(30,41,59,.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;padding-top:90px}
.cal-overlay.open{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cal-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px;width:calc(100% - 28px);max-width:370px;animation:slideDown .2s ease;box-shadow:0 20px 60px rgba(15,23,42,.18)}
@keyframes slideDown{from{transform:translateY(-12px);opacity:0}to{transform:translateY(0);opacity:1}}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month-label{font-size:15px;font-weight:700}
.cal-nav-btn{width:32px;height:32px;border-radius:9px;background:var(--surface2);color:var(--accent2);font-size:18px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dname{text-align:center;font-size:10px;font-weight:600;color:var(--dim);padding:4px 0 6px;letter-spacing:.4px}
.cal-day{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:background .12s}
.cal-day:active{background:var(--surface3)}
.cal-day.other{color:var(--muted)}
.cal-day.today{border:1px solid var(--accent2)}
.cal-day.selected{background:var(--accent);color:#fff}
/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:8px 14px max(20px,env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 70%,rgba(245,247,250,0));display:flex;align-items:center;gap:8px;z-index:100}
.nav-tabs{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:4px;display:flex;gap:4px;box-shadow:var(--shadow)}
.nav-tab{flex:1;padding:10px 8px;border-radius:11px;background:none;color:var(--dim);font-size:13px;font-weight:600;transition:all .18s}
.nav-tab.active{background:var(--accent);color:#fff}
.nav-avatar-btn{width:50px;height:50px;border-radius:14px;flex-shrink:0;cursor:pointer;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color .2s;box-shadow:var(--shadow)}
.nav-avatar-btn.active-tab{border-color:var(--accent)}
.nav-avatar-btn img{width:100%;height:100%;object-fit:cover}
.nav-avatar-initials{font-size:22px;font-weight:700;color:var(--accent2)}
.empty{text-align:center;padding:52px 24px;color:var(--dim)}
.empty-ico{font-size:44px;margin-bottom:12px}
.empty-txt{font-size:14px;line-height:1.6}
.loader{display:flex;align-items:center;justify-content:center;padding:52px 24px;gap:12px;color:var(--dim);font-size:14px}
.spinner{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--muted);border-top-color:var(--accent);animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="app-brand">
    <svg class="brand-mark" viewBox="0 0 56 40" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
      <g stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 10 L19 8 L19 32 L5 30 Z" fill="var(--surface)"/>
        <path d="M19 8 L28 9 L33 14 L33 32 L19 32 Z" fill="var(--surface)"/>
        <path d="M19 8 V32"/>
      </g>
      <g stroke="var(--muted)" stroke-width="1.2" stroke-linecap="round" opacity=".55">
        <path d="M8 14 L16 13.2"/>
        <path d="M8 18 L16 17.2"/>
        <path d="M8 22 L14 21.4"/>
        <path d="M22 19 L30 19.8"/>
        <path d="M22 23 L30 23.8"/>
      </g>
      <path d="M28 9 L52 2 L43 16 L33 14 Z" fill="var(--accent2)"/>
      <path d="M52 2 L43 16 L37 11 Z" fill="#E5651C"/>
    </svg>
    <span class="brand-wordmark">Study<span class="b-accent">Flow</span></span>
  </div>
  <div class="views">
    <div class="view active" id="view-schedule">
      <div class="header">
        <div class="header-date" id="headerDate">–</div>
        <button class="icon-btn" id="calBtn">📅</button>
      </div>
      <div class="days-strip" id="daysStrip"></div>
      <div class="lessons-list" id="lessonsList"><div class="loader"><div class="spinner"></div>Загрузка...</div></div>
    </div>
    <div class="view" id="view-subjects">
      <div class="page-header">Предметы</div>
      <div id="subjectsList"><div class="loader"><div class="spinner"></div>Загрузка...</div></div>
    </div>
    <div class="view" id="view-detail">
      <div class="detail-header">
        <button class="icon-btn" id="backBtn">←</button>
        <div class="detail-meta"><div class="detail-subject" id="detailSubject"></div><div class="detail-kind" id="detailKind"></div></div>
        <div class="detail-date-badge" id="detailDate"></div>
      </div>
      <div class="detail-card" id="detailBody"></div>
      <div class="attachments" id="attachments" style="margin-top:10px"></div>
    </div>
    <div class="view" id="view-profile">
      <div class="profile-hero">
        <div class="avatar-wrap"><div class="avatar-ring"><div class="avatar-inner" id="profileAvatar"><span id="profileInitials">?</span></div></div></div>
        <div class="profile-name" id="profileName">–</div>
        <div class="profile-username" id="profileUsername"></div>
      </div>
      <div class="profile-section">
        <div class="ps-title">Подгруппа</div>

const CFG={
  SUPABASE_URL:'https://ygqqyxhgrjjplqrqlzli.supabase.co',
  SUPABASE_KEY:'ВСТАВЬ_ANON_КЛЮЧ_НОВОГО_ПРОЕКТА',
  SCHEDULE_API:'' // напр. 'https://xxx.bothost.ru/api' — заполнится, когда узнаем URL бота
};
// Активная группа пользователя (заполняется из Supabase при старте):
//   {id, name, external_schedule_id, provider}
const S={date:new Date(),view:'schedule',prevView:'schedule',cache:{},hw:[],calDate:new Date(),subgroup:localStorage.getItem('subgroup')||null,theme:localStorage.getItem('theme')||'default',bg:localStorage.getItem('bg')||'none',tgUser:null,group:null};
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DNAMES=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
// Список CORS-прокси. Каждая запись — функция, строящая итоговый URL.
// Если один не сработал, fetchWeek автоматически попробует следующий.
//
// ⚠️ ПУБЛИЧНЫЕ ПРОКСИ НЕНАДЁЖНЫ — они часто меняют политику или ложатся.
// Самое надёжное решение — поднять свой Cloudflare Worker (бесплатно, 100k req/day).
// Код воркера лежит ниже в комментарии, инструкция — в README.
//
// Если у тебя есть свой воркер — раскомментируй первую строку и укажи свой адрес.
const PROXIES=[
  // u=>`https://ТВОЙ-ВОРКЕР.workers.dev/?url=${encodeURIComponent(u)}`,  // ← свой прокси, лучший вариант
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://proxy.corsfix.com/?${encodeURIComponent(u)}`,
];
const THEMES=[{id:'default',label:'StudyFlow',c:['#F5F7FA','#2A5CAA','#FF7A42']},{id:'midnight',label:'Фиолет',c:['#F4F2FB','#7C3AED','#A78BFA']},{id:'aurora',label:'Аврора',c:['#EFFAF5','#0E9F70','#10B981']},{id:'sunset',label:'Закат',c:['#FFF6F0','#EA580C','#FB923C']},{id:'ocean',label:'Океан',c:['#EEF8FB','#0891B2','#06B6D4']},{id:'sakura',label:'Сакура',c:['#FDF2F8','#DB2777','#EC4899']}];
const BGS=[{id:'none',label:'Нет',ico:'⬛'},{id:'dots',label:'Точки',ico:'⠿'},{id:'grid',label:'Сетка',ico:'#'},{id:'circuit',label:'Схема',ico:'⊞'},{id:'aurora',label:'Свет',ico:'✦'}];
const key=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const pad=n=>String(n).padStart(2,'0');
const fmtD=d=>`${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
const fmtA=d=>`${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
function weekOf(d){const c=new Date(d),dow=c.getDay()||7;c.setDate(c.getDate()-dow+1);const mon=new Date(c),sun=new Date(c);sun.setDate(c.getDate()+6);return{mon,sun}}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);S.theme=t;localStorage.setItem('theme',t);document.querySelectorAll('.theme-swatch').forEach(el=>el.classList.toggle('active',el.dataset.theme===t))}
function applyBg(b){document.documentElement.setAttribute('data-bg',b);S.bg=b;localStorage.setItem('bg',b);document.querySelectorAll('.bg-opt').forEach(el=>el.classList.toggle('active',el.dataset.bg===b))}
function buildThemeGrid(){const g=document.getElementById('themeGrid');THEMES.forEach(t=>{const el=document.createElement('div');el.className='theme-swatch'+(t.id===S.theme?' active':'');el.dataset.theme=t.id;el.innerHTML=`<div class="sw-preview" style="background:${t.c[0]}"><div class="sw-line" style="width:70%;background:${t.c[1]}"></div><div class="sw-line" style="width:45%;background:${t.c[2]}"></div></div>`;el.title=t.label;el.addEventListener('click',()=>applyTheme(t.id));g.appendChild(el)})}
function buildBgGrid(){const g=document.getElementById('bgGrid');BGS.forEach(b=>{const el=document.createElement('div');el.className='bg-opt'+(b.id===S.bg?' active':'');el.dataset.bg=b.id;el.innerHTML=`<span class="bg-ico">${b.ico}</span><span>${b.label}</span>`;el.addEventListener('click',()=>applyBg(b.id));g.appendChild(el)})}
async function loadProfileUI(){
  const u=S.tgUser;
  if(!u){document.getElementById('profileName').textContent='Гость';return}
  const name=[u.first_name,u.last_name].filter(Boolean).join(' ');
  document.getElementById('profileName').textContent=name||u.username||'–';
  document.getElementById('profileUsername').textContent=u.username?'@'+u.username:'';
  const initials=(u.first_name?.[0]||'')+(u.last_name?.[0]||'');
  document.getElementById('profileInitials').textContent=initials||u.first_name?.[0]||'?';
  if(u.photo_url){
    const img1=document.createElement('img');img1.src=u.photo_url;img1.onerror=()=>img1.remove();document.getElementById('profileAvatar').appendChild(img1);
    const img2=document.createElement('img');img2.src=u.photo_url;img2.onerror=()=>img2.remove();
    const nb=document.getElementById('profileBtn');nb.innerHTML='';nb.appendChild(img2);
  }else{document.getElementById('navInitials').textContent=initials||'👤'}
  if(CFG.SUPABASE_KEY&&u.id){
    try{const r=await fetch(`${CFG.SUPABASE_URL}/rest/v1/users?user_id=eq.${u.id}&select=*`,{headers:{'apikey':CFG.SUPABASE_KEY,'Authorization':`Bearer ${CFG.SUPABASE_KEY}`}});const data=await r.json();if(data?.length&&data[0].subgroup&&!localStorage.getItem('subgroup')){S.subgroup=data[0].subgroup;localStorage.setItem('subgroup',S.subgroup)}}catch(e){console.warn(e)}
  }
  updateSGUI();
}

async function setSubgroup(sg){
  S.subgroup=sg;localStorage.setItem('subgroup',sg);updateSGUI();renderStrip();await loadWeekAndRender(S.date);
  if(CFG.SUPABASE_KEY&&S.tgUser?.id){try{await fetch(`${CFG.SUPABASE_URL}/rest/v1/users?user_id=eq.${S.tgUser.id}`,{method:'PATCH',headers:{'apikey':CFG.SUPABASE_KEY,'Authorization':`Bearer ${CFG.SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({subgroup:sg})})}catch(e){console.warn(e)}}
}
function bindNav(){document.querySelectorAll('.nav-tab').forEach(b=>b.addEventListener('click',()=>goView(b.dataset.view)));document.getElementById('profileBtn').addEventListener('click',()=>goView('profile'));document.getElementById('backBtn').addEventListener('click',()=>goView(S.prevView))}
function goView(name){if(name==='detail')S.prevView=S.view;S.view=name;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(`view-${name}`).classList.add('active');document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.view===name));document.getElementById('profileBtn').classList.toggle('active-tab',name==='profile');document.querySelector('.bottom-nav').style.display=name==='detail'?'none':'';if(name==='subjects')renderSubjects()}
async function loadActiveGroup(){
  if(!CFG.SUPABASE_KEY||CFG.SUPABASE_KEY.startsWith('ВСТАВЬ')||!S.tgUser?.id)return null;
  const H={'apikey':CFG.SUPABASE_KEY,'Authorization':`Bearer ${CFG.SUPABASE_KEY}`};
  try{
    const ru=await fetch(`${CFG.SUPABASE_URL}/rest/v1/users?user_id=eq.${S.tgUser.id}&select=active_group_id,subgroup`,{headers:H});
    const us=await ru.json();
    if(!us?.length||!us[0].active_group_id)return null;
    if(us[0].subgroup&&!localStorage.getItem('subgroup')){S.subgroup=us[0].subgroup;localStorage.setItem('subgroup',S.subgroup)}
    const gid=us[0].active_group_id;
    const rg=await fetch(`${CFG.SUPABASE_URL}/rest/v1/groups?id=eq.${gid}&select=id,name,external_schedule_id,institution_id`,{headers:H});
    const gs=await rg.json();
    if(!gs?.length)return null;
    const g=gs[0];
    let provider=null;
    if(g.institution_id){
      const ri=await fetch(`${CFG.SUPABASE_URL}/rest/v1/institutions?id=eq.${g.institution_id}&select=schedule_provider`,{headers:H});
      const is=await ri.json();
      provider=is?.length?is[0].schedule_provider:null;
    }
    S.group={id:g.id,name:g.name,external_schedule_id:g.external_schedule_id,provider};
    return S.group;
  }catch(e){console.warn('loadActiveGroup',e);return null}
}

async function fetchWeek(mon,sun){
  const g=S.group;
  if(!g||!g.external_schedule_id)return [];
  if(CFG.SCHEDULE_API){
    try{
      const u=`${CFG.SCHEDULE_API}/schedule?group=${encodeURIComponent(g.external_schedule_id)}&provider=${encodeURIComponent(g.provider||'')}&start=${fmtA(mon)}&finish=${fmtA(sun)}`;
      const r=await fetch(u,{headers:{'Accept':'application/json'}});
      if(r.ok){const d=await r.json();return Array.isArray(d)?d:(d.lessons||[])}
    }catch(e){console.warn('schedule api',e)}
    return [];
  }
  if(g.provider!=='omgtu')return [];
  const url=`https://rasp.omgtu.ru/api/schedule/group/${g.external_schedule_id}?start=${fmtA(mon)}&finish=${fmtA(sun)}&lng=1`;
  const sources=[url, ...PROXIES.map(fn=>fn(url))];
  for(const src of sources){
    const tag=src.length>70?src.slice(0,70)+'…':src;
    try{
      // 10-секундный таймаут на каждый прокси, чтобы не висеть бесконечно
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),10000);
      const r=await fetch(src,{headers:{'Accept':'application/json'},signal:ctrl.signal});
      clearTimeout(t);
      if(!r.ok){console.warn('[schedule] HTTP',r.status,'via',tag);continue}
      const text=await r.text();
      let data;
      try{data=JSON.parse(text)}
      catch{console.warn('[schedule] not JSON via',tag,'(first 100 chars):',text.slice(0,100));continue}
      // Универсально достаём массив пар: либо сам ответ — массив,
      // либо где-то внутри объекта (allorigins иногда оборачивает)
      const lessons=Array.isArray(data)?data
        :Array.isArray(data?.contents)?data.contents
        :Array.isArray(data?.data)?data.data
        :Array.isArray(data?.lessons)?data.lessons
        :null;
      if(lessons){console.log('[schedule] OK via',tag,'lessons:',lessons.length);return lessons}
      console.warn('[schedule] unexpected payload shape via',tag,Object.keys(data||{}));
    }catch(e){console.warn('[schedule] fetch failed via',tag,e.message)}
  }
  console.error('[schedule] ALL sources failed for',url);
  return[];
}
async function loadWeekAndRender(date){const k=key(date);if(!S.cache[k]){document.getElementById('lessonsList').innerHTML='<div class="loader"><div class="spinner"></div>Загрузка...</div>';const{mon,sun}=weekOf(date);const lessons=await fetchWeek(mon,sun);lessons.forEach(l=>{const dk=l.date?l.date.replace(/\./g,'-'):'';if(dk){if(!S.cache[dk])S.cache[dk]=[];S.cache[dk].push(l)}});for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);if(!S.cache[key(d)])S.cache[key(d)]=[]}}renderLessons(date);renderStrip()}
function filterSG(lessons){if(!S.subgroup)return lessons;const otherSub=S.subgroup==='1'?'2':'1';return lessons.filter(l=>{const disc=(l.discipline||'').toLowerCase();const stream=(l.stream||l.subGroup||l.subgroup||l.group||'').toLowerCase();if((disc+' '+stream).includes('/'+otherSub))return false;return true;})}
async function loadHW(){
  if(!CFG.SUPABASE_KEY||CFG.SUPABASE_KEY.startsWith('ВСТАВЬ'))return;
  // ДЗ только активной группы пользователя.
  const gid=S.group?.id;
  if(!gid){S.hw=[];return}
  const url=`${CFG.SUPABASE_URL}/rest/v1/homeworks?group_id=eq.${gid}&select=*&order=date_for.asc`;
  const headers={'apikey':CFG.SUPABASE_KEY,'Authorization':`Bearer ${CFG.SUPABASE_KEY}`,'Content-Type':'application/json'};
  try{
    const r=await fetch(url,{headers,mode:'cors'});
    if(r.ok){S.hw=await r.json();console.log('✓ HW loaded:',S.hw.length);}
    else console.warn('HW fetch status:',r.status,await r.text());
  }catch(e){console.warn('HW fetch error:',e);}
}
function hwFor(subj){return S.hw.filter(h=>fuzzy(h.subject,subj))}
// Только ДЗ на конкретную дату (для карточек расписания)
function hwForDate(subj,dateKey){return S.hw.filter(h=>fuzzy(h.subject,subj)&&h.date_for===dateKey)}
function fuzzy(a,b){if(!a||!b)return false;const n=s=>s.toLowerCase().replace(/ё/g,'е').replace(/\s+/g,' ').trim();const na=n(a),nb=n(b);if(na===nb||na.includes(nb)||nb.includes(na))return true;const wa=na.split(' '),wb=nb.split(' ');return wa[0]&&wb[0]&&wa[0]===wb[0]&&wa[0].length>4}
function renderStrip(){const{mon}=weekOf(S.date);const strip=document.getElementById('daysStrip');strip.innerHTML='';for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);const dk=key(d),isA=dk===key(S.date);const lessons=filterSG(S.cache[dk]||[]);const hasHW=lessons.some(l=>hwForDate(l.discipline,dk).length>0);const pill=document.createElement('div');pill.className='day-pill'+(isA?' active':'')+(hasHW?' has-hw':'');pill.innerHTML=`<span>${d.getDate()}</span><span class="dn">${DNAMES[i]}</span>`;pill.addEventListener('click',()=>pickDay(new Date(d)));strip.appendChild(pill);if(isA)setTimeout(()=>pill.scrollIntoView({inline:'center',behavior:'smooth'}),30)}document.getElementById('headerDate').textContent=fmtD(S.date)}
async function pickDay(d){S.date=d;renderStrip();await loadWeekAndRender(d)}
function renderLessons(date){const lessons=filterSG(S.cache[key(date)]||[]);const el=document.getElementById('lessonsList');if(!lessons.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🎉</div><div class="empty-txt">Занятий нет —<br>можно отдохнуть!</div></div>`;return}el.innerHTML='';lessons.forEach(l=>{const hws=hwForDate(l.discipline,key(date)),hw0=hws[0];const card=document.createElement('div');card.className='lesson-card'+(hw0?' has-hw':'');card.innerHTML=`<div class="lc-top"><div class="lc-subject">${l.discipline||'—'}</div><div class="lc-right"><div class="lc-time">${l.beginLesson||''}–${l.endLesson||''}</div>${hw0?`<button class="hw-toggle">›</button>`:''}</div></div><div class="lc-kind">${l.kindOfWork||''}</div><div class="lc-meta">${l.lecturer?`<span>${l.lecturer}</span>`:''}${l.lecturer&&l.auditorium?`<span class="lc-dot"></span>`:''} ${l.auditorium?`<span>${l.auditorium}${l.building?' '+l.building:''}</span>`:''}</div>${hw0?`<div class="lc-hw">${needsDetailPage(hw0)?`<div class="lc-hw-text">${esc(hw0.task||'')}</div><button class="btn-primary hw-detail-btn">Посмотреть полностью</button>`:`<div style="font-size:13px;color:var(--dim);line-height:1.6">${esc(hw0.task||'')}</div>`}</div>`:""}`; if(hw0){const toggle=card.querySelector('.hw-toggle'),section=card.querySelector('.lc-hw');toggle.addEventListener('click',()=>{const open=section.classList.toggle('open');toggle.classList.toggle('open',open);toggle.textContent=open?'✓':'›'});const fb=card.querySelector('.hw-detail-btn');if(fb)fb.addEventListener('click',()=>openDetail(hw0,l))}el.appendChild(card)})}
function renderSubjects(){const el=document.getElementById('subjectsList');const allL=filterSG(Object.values(S.cache).flat());const seen=new Set(),subjects=[];allL.forEach(l=>{if(l.discipline&&!seen.has(l.discipline)){seen.add(l.discipline);subjects.push(l.discipline)}});if(!subjects.length){el.innerHTML=`<div class="empty"><div class="empty-ico">📚</div><div class="empty-txt">Открой расписание —<br>здесь появятся предметы</div></div>`;return}el.innerHTML='';subjects.forEach(subj=>{const hws=hwFor(subj);const group=document.createElement('div');group.className='subject-group';let rows='';if(!hws.length){rows=`<div class="hw-row"><div class="hw-empty">Домашних заданий нет</div></div>`}else{hws.forEach(hw=>{const d=new Date(hw.date_for);const ds=`${pad(d.getDate())}.${pad(d.getMonth()+1)}`;const dl=S.cache[hw.date_for]||[];const match=dl.find(l=>fuzzy(l.discipline,subj));const kind=match?.kindOfWork||'';rows+=`<div class="hw-row"><div class="hw-row-top"><span class="hw-row-date">${ds}</span><span class="hw-row-kind">${kind}</span><button class="hw-chevron">›</button></div><div class="hw-row-body"><div class="hw-row-task">${esc(hw.task||'')}</div><button class="btn-primary">Посмотреть полностью</button></div></div>`})}group.innerHTML=`<div class="subj-title">${subj}</div>${rows}`;group.querySelectorAll('.hw-chevron').forEach(btn=>{btn.addEventListener('click',()=>{const body=btn.closest('.hw-row').querySelector('.hw-row-body');const open=body.classList.toggle('open');btn.classList.toggle('open',open);btn.textContent=open?'✓':'›'})});group.querySelectorAll('.btn-primary').forEach((btn,i)=>{btn.addEventListener('click',()=>{const hw=hws[i];if(!hw)return;const dl=S.cache[hw.date_for]||[];const lesson=dl.find(l=>fuzzy(l.discipline,subj))||null;openDetail(hw,lesson)})});el.appendChild(group)})}
function openDetail(hw,lesson){document.getElementById('detailSubject').textContent=hw.subject||lesson?.discipline||'';document.getElementById('detailKind').textContent=lesson?.kindOfWork||'';const d=new Date(hw.date_for);document.getElementById('detailDate').textContent=`${pad(d.getDate())}.${pad(d.getMonth()+1)}`;document.getElementById('detailBody').textContent=hw.task||'';renderAttachments(hw);goView('detail')}
async function renderAttachments(hw){
  const el=document.getElementById('attachments');el.innerHTML='';
  let files=[];
  try{if(hw.attachment_file_id)files=JSON.parse(hw.attachment_file_id)}catch{}
  if(!files.length)return;
  for(const f of files){
    const div=document.createElement('div');
    if(f.type==='photo'){
      // Фото грузим через эндпоинт бота (SCHEDULE_API). Токен в вебапп не кладём.
      if(!CFG.SCHEDULE_API){
        div.className='attach-photo';
        div.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--dim)">🖼️</div>';
        el.appendChild(div);
        continue;
      }
      const photoUrl=`${CFG.SCHEDULE_API}/photo?file_id=${encodeURIComponent(f.file_id)}`;
      div.className='attach-photo';
      div.innerHTML=`<img src="${photoUrl}" alt="" loading="lazy">`;
      div.onclick=()=>openLightbox(photoUrl);
      el.appendChild(div);
    } else if(f.type==='document'){
      div.className='attach-doc';
      div.innerHTML=`<span style="font-size:22px">📄</span><span>${f.file_name||'Документ'}</span>`;
      el.appendChild(div);
    }
  }
}
function bindCalendar(){document.getElementById('calBtn').addEventListener('click',openCal);document.getElementById('calOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCal()});document.getElementById('calPrev').addEventListener('click',()=>{S.calDate.setMonth(S.calDate.getMonth()-1);drawCal()});document.getElementById('calNext').addEventListener('click',()=>{S.calDate.setMonth(S.calDate.getMonth()+1);drawCal()})}
function openCal(){S.calDate=new Date(S.date);drawCal();document.getElementById('calOverlay').classList.add('open')}
function closeCal(){document.getElementById('calOverlay').classList.remove('open')}
function drawCal(){const d=S.calDate,g=document.getElementById('calGrid'),today=key(new Date());document.getElementById('calMonthLabel').textContent=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`;g.innerHTML='';DNAMES.forEach(n=>{const c=document.createElement('div');c.className='cal-dname';c.textContent=n;g.appendChild(c)});const first=new Date(d.getFullYear(),d.getMonth(),1),last=new Date(d.getFullYear(),d.getMonth()+1,0);let startDow=first.getDay()||7;for(let i=startDow-1;i>0;i--){const pd=new Date(first);pd.setDate(first.getDate()-i);addCalCell(g,pd,true,today)}for(let i=1;i<=last.getDate();i++)addCalCell(g,new Date(d.getFullYear(),d.getMonth(),i),false,today);const total=g.querySelectorAll('.cal-day').length;for(let i=1;i<=42-total;i++){const pd=new Date(last);pd.setDate(last.getDate()+i);addCalCell(g,pd,true,today)}}
function addCalCell(g,date,other,today){const dk=key(date),sel=dk===key(S.date),tod=dk===today;const c=document.createElement('div');c.className='cal-day'+(other?' other':'')+(tod?' today':'')+(sel?' selected':'');c.textContent=date.getDate();c.addEventListener('click',async()=>{closeCal();await pickDay(new Date(date))});g.appendChild(c)}

function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

const COLOR_PRESETS=['#2A5CAA', '#FF7A42', '#7c3aed', '#10b981', '#ea580c', '#0891b2', '#db2777', '#f59e0b', '#ef4444', '#64748b'];

function buildColorSwatches(){
  const g=document.getElementById('colorSwatches');
  if(!g)return;
  const saved=localStorage.getItem('accentColor');
  COLOR_PRESETS.forEach(c=>{
    const el=document.createElement('div');
    el.className='color-dot'+(saved===c?' active':'');
    el.style.background=c;
    el.onclick=()=>applyAccentColor(c,el,true);
    g.appendChild(el);
  });
}

function applyAccentColor(hex,el,save){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  // Меняем только основной --accent. --accent2 (оранжевый StudyFlow) и тонкий бордер
  // оставляем фирменными, чтобы кастомный цвет не «съедал» айдентику.
  document.documentElement.style.setProperty('--accent',hex);
  document.documentElement.style.setProperty('--border',`rgba(${r},${g},${b},.16)`);
  if(save){
    localStorage.setItem('accentColor',hex);
    document.querySelectorAll('.color-dot').forEach(d=>d.classList.toggle('active',d.style.background===hex||rgbToHex(d.style.background)===hex));
  }
}

function rgbToHex(rgb){
  const m=rgb.match(/\d+/g);if(!m)return rgb;
  return '#'+m.slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
}
function needsDetailPage(hw){
  const task=hw.task||'';
  let attachments=[];
  try{if(hw.attachment_file_id)attachments=JSON.parse(hw.attachment_file_id);}catch{}
  return task.length>30||attachments.length>0;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

function handleAvatarUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const b64=ev.target.result;
    localStorage.setItem('customAvatar',b64);
    applyCustomAvatar(b64);
  };
  reader.readAsDataURL(file);
}
function applyCustomAvatar(src){
  const img=`<img src="${src}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`;
  const av=document.getElementById('profileAvatar');if(av)av.innerHTML=img;
  const nb=document.getElementById('profileBtn');if(nb){nb.innerHTML='';const i=document.createElement('img');i.src=src;i.style.cssText='width:100%;height:100%;object-fit:cover';nb.appendChild(i);}
  const prev=document.getElementById('avPreviewContent');if(prev)prev.innerHTML=`<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
}
function resetAvatar(){
  localStorage.removeItem('customAvatar');
  const av=document.getElementById('profileAvatar');
  const initials=document.getElementById('profileInitials');
  if(av&&initials){av.innerHTML='';av.appendChild(initials);}
  const nb=document.getElementById('profileBtn');
  const navInit=document.getElementById('navInitials');
  if(nb&&navInit){nb.innerHTML='';nb.appendChild(navInit);}
  const prev=document.getElementById('avPreviewContent');if(prev)prev.textContent='👤';
}

document.addEventListener('DOMContentLoaded',async()=>{
  if(window.Telegram?.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    try{Telegram.WebApp.setHeaderColor('#F5F7FA');Telegram.WebApp.setBackgroundColor('#F5F7FA');}catch(e){}
    S.tgUser=Telegram.WebApp.initDataUnsafe?.user||null
  }
  applyTheme(S.theme);applyBg(S.bg);buildThemeGrid();buildBgGrid();buildColorSwatches();const savedColor=localStorage.getItem("accentColor");if(savedColor)applyAccentColor(savedColor,null,false);bindNav();bindCalendar();
  await loadProfileUI();const savedAv=localStorage.getItem('customAvatar');if(savedAv)applyCustomAvatar(savedAv);
  await loadActiveGroup();
  // Показать имя активной группы в шапке профиля, если есть элемент.
  const gn=document.getElementById('profileGroup');if(gn)gn.textContent=S.group?S.group.name:'Группа не выбрана';
  await loadHW();renderStrip();await loadWeekAndRender(S.date);
  if(!S.subgroup)goView('profile');
});
